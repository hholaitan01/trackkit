name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
        working-directory: apps/api
      - run: npx prisma generate
        working-directory: apps/api
      - run: npx tsc --noEmit
        working-directory: apps/api
      - run: npm test
        working-directory: apps/api

  pages:
    name: Pages — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/pages/package-lock.json
      - run: npm ci
        working-directory: apps/pages
      - run: npm run build
        working-directory: apps/pages

  sdk:
    name: SDK — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json
      - run: npm ci
        working-directory: packages/sdk
      - run: npm run build
        working-directory: packages/sdk

  widget:
    name: Widget — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts
        working-directory: packages/widget
      - run: npm run build
        working-directory: packages/widget
